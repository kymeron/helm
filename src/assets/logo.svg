    <path d="M 200 200 Q 240 250 280 320 Q 270 305 255 315 Q 220 255 205 220 Z" opacity="0.9"/>
    <path d="M 200 200 Q 220 250 240 340 Q 232 325 215 330 Q 200 260 200 220 Z" opacity="0.92"/>

